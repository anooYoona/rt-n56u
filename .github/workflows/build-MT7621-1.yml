name: Build MT7621-1

on: 
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        # 安装依赖，并强制降级 GCC 到 v9，以兼容老毛子老旧的内核代码
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget ca-certificates \
        gcc-9 g++-9
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 100

    - name: Clone source code
      run: |
        cd toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Build Firmware
      env:
        TNAME: "E8820V2"
      run: |
        cwd=`pwd`
        CONFIG_TOOLCHAIN_DIR=${cwd//\//\\\/}\\/toolchain-mipsel
        cd trunk
        
        # 极客神级补丁：手动拉取 Go 环境，解决新系统 wget 证书报错导致的 html 解压惨案
        echo "Injecting Go environment patch..."
        mkdir -p tools
        wget --no-check-certificate -qO tools/go.tar.gz https://dl.google.com/go/go1.17.13.linux-amd64.tar.gz
        tar -zxf tools/go.tar.gz -C tools/
        rm -f tools/go.tar.gz
        
        for m in $TNAME;
        do
        if [ ! -f configs/templates/$m.config ] ; then
        echo "configs/templates/$m.config not found "
        exit 1
        fi
        cp -f configs/templates/$m.config .config
        
        # 绝对尊重你的定制配置，不添加任何强盗覆写逻辑
        sed -i "s/^CONFIG_TOOLCHAIN_DIR=.*$/CONFIG_TOOLCHAIN_DIR=${CONFIG_TOOLCHAIN_DIR}/g" .config
        sudo ./clear_tree_simple
        sudo ./build_firmware_modify $m 0
        sudo mv -f images/*.trx /opt/images/
        done
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: E8820V2-Padavan-Firmware
        path: /opt/images/*.trx
