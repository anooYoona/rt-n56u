name: Build MT7621-1

on: 
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        # 极客补丁 1：直接在系统层安装原生 golang，从源头解决问题
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget ca-certificates \
        gcc-9 g++-9 golang
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 100

    - name: Clone source code
      run: |
        cd toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Build Firmware
      env:
        TNAME: "E8820V2"
      run: |
        cwd=`pwd`
        CONFIG_TOOLCHAIN_DIR=${cwd//\//\\\/}\\/toolchain-mipsel
        cd trunk
        
        # 极客补丁 2：使用软链接“偷天换日”，欺骗旧 Makefile 让它直接跳过坑爹的下载步骤！
        echo "Injecting ultimate Go environment spoofing..."
        mkdir -p tools/go/bin
        ln -sf /usr/bin/go tools/go/bin/go
        
        # 极客补丁 3：顺手把 Makefile 里脆弱的 wget 全局替换成带重试逻辑的 curl
        sed -i 's/wget -O/curl -kLo/g' tools/Makefile
        sed -i 's/wget --no-check-certificate -O/curl -kLo/g' tools/Makefile
        
        for m in $TNAME;
        do
        if [ ! -f configs/templates/$m.config ] ; then
        echo "configs/templates/$m.config not found "
        exit 1
        fi
        cp -f configs/templates/$m.config .config
        
        sed -i "s/^CONFIG_TOOLCHAIN_DIR=.*$/CONFIG_TOOLCHAIN_DIR=${CONFIG_TOOLCHAIN_DIR}/g" .config
        sudo ./clear_tree_simple
        sudo ./build_firmware_modify $m 0
        sudo mv -f images/*.trx /opt/images/
        done

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: E8820V2-Padavan-Firmware
        path: /opt/images/*.trx
